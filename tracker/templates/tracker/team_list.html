{% extends 'tracker/base.html' %}
{% block content %}
<h1>NBA Teams</h1>

<a href="{% url 'add-team' %}" class="btn btn-success mb-3">Add New Team</a>

<ul class="list-group">
  {% for team in teams %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ team.name }}
      <form method="post" action="{% url 'delete-team' team.id %}" onsubmit="return confirmDelete()" style="display:inline;">
        {% csrf_token %}
        <button class="btn btn-sm btn-danger">Remove</button>
      </form>
    </li>
  {% endfor %}
</ul>

<script>
  function confirmDelete() {
    return confirm('Delete this team?');
  }
</script>
{% endblock %}
