<!DOCTYPE html>
<html>
<head><title>My Watchlist</title></head>
<body>
  <h1>My Favorite Players</h1>
  {% if favorites %}
    <ul>
      {% for fav in favorites %}
        <li>{{ fav.player.name }} ({{ fav.player.team.name }})</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>You haven't added any players yet.</p>
  {% endif %}
  <a href="/players">Back to Players</a>
</body>
</html>
