<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}NBA Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">NBA Tracker</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/teams">Teams</a>
        <a class="nav-link" href="/players">Players</a>
        <a class="nav-link" href="/watchlist">Watchlist</a>
        <a class="nav-link" href="/game-logs">Game Logs</a>
        {% if user.is_authenticated %}
        <li class="nav-item">
        <form method="post" action="{% url 'logout' %}" style="display: inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link" style="padding: 0;">Logout</button>
        </form>
      </li> 
        {% else %}
          <a class="nav-link" href="/login">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
