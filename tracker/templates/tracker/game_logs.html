<!DOCTYPE html>
<html>
<head><title>Game Logs</title></head>
<body>
  <h1>Game Logs</h1>
  <ul>
    {% for log in logs %}
      <li>
        {{ log.date }}: {{ log.team.name }} {{ log.team_score }} -
        {{ log.opponent }} {{ log.opponent_score }} |
        Top Performer: {{ log.top_performer }}
      </li>
    {% endfor %}
  </ul>
  <a href="/teams">Back to Teams</a>
</body>
</html>
