{% extends 'tracker/base.html' %}
{% block content %}
  <div class="text-center mt-5">
    <h1>Welcome to NBA Tracker</h1>
    <p>Choose an action below:</p>

    <button class="btn btn-primary mx-2" onclick="showMessage('login')">Login</button>
    <button class="btn btn-secondary mx-2" onclick="showMessage('register')">Register</button>

    <div id="message-box" class="mt-3 text-info" style="display: none;"></div>

    <div class="mt-4">
      <a href="{% url 'login' %}">Go to Login</a> |
      <a href="{% url 'register' %}">Go to Register</a>
    </div>
  </div>

  <script>
    function showMessage(type) {
      const box = document.getElementById('message-box');
      if (type === 'login') {
        box.innerText = 'Login to access your personalized NBA tracking dashboard!';
      } else {
        box.innerText = 'Register to start saving your favorite teams and players!';
      }
      box.style.display = 'block';
    }
  </script>
{% endblock %}
